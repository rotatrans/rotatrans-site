                                <div><p class="text-gray-600 text-sm">📅 Data Lance</p><p class="font-bold">${l.data}</p></div>
                                <div><p class="text-gray-600 text-sm">📦 Descrição</p><p class="font-bold text-sm">${frete ? frete.descricao : 'N/A'}</p></div>
                                <div><p class="text-gray-600 text-sm">⚖️ Peso</p><p class="font-bold">${frete ? frete.peso : 'N/A'}</p></div>
                            </div>
                        </div>
                    `;
                });
                html += `
                            </div>
                        </div>
                    </div>
                `;
                return html;
            },

            // ===== NOVAS TELAS EMBARCADOR =====
            renderCriarFrete() {
                const emb = db.embarcadores.find(e => e.id === this.empresa_id);
                return `
                    <div class="min-h-screen bg-gradient-to-br from-red-50 to-pink-50 p-6">
                        <div class="max-w-6xl mx-auto">
                            <button onclick="app.tela = 'dashboard_emb'; app.render()" class="mb-6 bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded-lg font-bold">← Voltar</button>
                            <h2 class="text-3xl font-bold text-red-700 mb-6">➕ Criar Novo Frete</h2>
                            
                            <div class="bg-white rounded-xl shadow-md p-8 border-l-4 border-red-500">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                    <!-- ORIGEM: BASES CADASTRADAS -->
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">📍 Origem (Base)</label>
                                        <select id="base_origem" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-red-500 focus:outline-none">
                                            <option value="">-- Selecione uma base --</option>
                                            ${emb?.bases ? emb.bases.map(b => `<option value="${b.nome}">${b.nome} (${b.endereco})</option>`).join('') : '<option value="">Nenhuma base cadastrada</option>'}
                                        </select>
                                    </div>

                                    <!-- DESTINO -->
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">📍 Destino</label>
                                        <input type="text" placeholder="Ex: Campinas" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-red-500 focus:outline-none">
                                    </div>

                                    <!-- VEÍCULO -->
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">🚚 Tipo de Veículo</label>
                                        <select id="tipo_veiculo" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-red-500 focus:outline-none">
                                            <option value="">-- Selecione o veículo --</option>
                                            <option value="bau">Van/Baú</option>
                                            <option value="fiorino">Fiorino</option>
                                            <option value="truck">Caminhão (10-20 ton)</option>
                                            <option value="carreta">Carreta (24-40 ton)</option>
                                            <option value="bitruck">Bi-Trem/Combinado</option>
                                            <option value="container">Container (20/40 pés)</option>
                                            <option value="moto">Moto</option>
                                            <option value="carro">Carro</option>
                                        </select>
                                    </div>

                                    <!-- TIPO DE CARGA -->
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">🌡️ Tipo de Carga</label>
                                        <select id="tipo_carga" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-red-500 focus:outline-none">
                                            <option value="">-- Selecione o tipo --</option>
                                            <option value="seca">Carga Seca</option>
                                            <option value="refrigerada">Refrigerado</option>
                                        </select>
                                    </div>

                                    <!-- TIPO DE ROTA -->
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">🗺️ Tipo de Rota</label>
                                        <select id="tipo_rota" onchange="app.atualizarTipoRota()" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-red-500 focus:outline-none">
                                            <option value="">-- Selecione o tipo --</option>
                                            <option value="fixa">Fixa (Rotina)</option>
                                            <option value="esporadica">Esporádica (Eventual)</option>
                                        </select>
                                    </div>

                                    <!-- PESO/QUANTIDADE -->
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">⚖️ Peso/ Quantidade de entregas</label>
                                        <input type="text" id="peso_quantidade" placeholder="Ex: 500 kg ou 10 entregas" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-red-500 focus:outline-none">
                                    </div>

                                    <!-- VALOR -->
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">💰 Valor Proposto</label>
                                        <input type="text" placeholder="Ex: R$ 450,00" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-red-500 focus:outline-none">
                                    </div>

                                    <!-- PERÍODO: Inicialmente oculto -->
                                    <div id="div_periodo" style="display:none;">
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">📅 Qual Período?</label>
                                        <input type="text" id="periodo_input" placeholder="Ex: Segundas e Quartas às 8h" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-red-500 focus:outline-none">
                                    </div>

                                    <!-- BENEFÍCIOS -->
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">🎁 Benefícios</label>
                                        <input type="text" id="beneficios" placeholder="Ex: Convênio em posto, PIX na entrega, prêmios" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-red-500 focus:outline-none">
                                    </div>

                                    <!-- DATA LIMITE DE LANCES -->
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">⏰ Prazo para Aceitar Lances</label>
                                        <input type="date" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-red-500 focus:outline-none">
                                    </div>
                                </div>

                                <!-- DESCRIÇÃO -->
                                <div class="mb-6">
                                    <label class="block text-sm font-semibold text-gray-700 mb-2">📦 Descrição do Frete</label>
                                    <textarea placeholder="Descreva o conteúdo do frete, condições especiais, etc..." class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-red-500 focus:outline-none h-24"></textarea>
                                </div>

                                <!-- RESUMO -->
                                <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded">
                                    <p class="text-sm text-red-800">
                                        <strong>ℹ️ Informações Importantes:</strong><br>
                                        • Os motoristas poderão dar lances até a data/hora limite<br>
                                        • Você pode aceitar ou rejeitar cada lance<br>
                                        • O frete será considerado fechado quando aceitar um lance
                                    </p>
                                </div>

                                <!-- BOTÕES -->
                                <div class="flex gap-4">
                                    <button onclick="app.tela = 'dashboard_emb'; app.render()" class="flex-1 bg-gray-400 hover:bg-gray-500 text-white px-6 py-3 rounded-lg font-bold">❌ Cancelar</button>
                                    <button onclick="alert('✅ Frete criado com sucesso! Agora aguarde os lances dos motoristas.'); app.tela = 'dashboard_emb'; app.render()" class="flex-1 bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-lg font-bold">✅ Criar Frete</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            atualizarTipoRota() {
                const tipoRota = document.getElementById('tipo_rota').value;
                const divPeriodo = document.getElementById('div_periodo');
                if (tipoRota === 'fixa' || tipoRota === 'esporadica') {
                    divPeriodo.style.display = 'block';
                    if (tipoRota === 'fixa') {
                        document.getElementById('periodo_input').placeholder = 'Ex: Segundas e Quartas às 8h';
                    } else {
                        document.getElementById('periodo_input').placeholder = 'Ex: Sempre que houver carga disponível';
                    }
                } else {
                    divPeriodo.style.display = 'none';
                }
            },

            renderCriarBase() {
                return `
                    <div class="min-h-screen bg-gradient-to-br from-green-50 to-emerald-50 p-6">
                        <div class="max-w-6xl mx-auto">
                            <button onclick="app.tela = 'dashboard_emb'; app.render()" class="mb-6 bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded-lg font-bold">← Voltar</button>
                            <h2 class="text-3xl font-bold text-green-700 mb-6">➕ Criar Nova Base</h2>
                            
                            <div class="bg-white rounded-xl shadow-md p-8 border-l-4 border-green-500">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">🏢 Nome da Base</label>
                                        <input type="text" placeholder="Ex: Base São Paulo" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-green-500 focus:outline-none">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-2">📍 Endereço</label>
                                        <input type="text" placeholder="Ex: Av Brasil, 1000" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-green-500 focus:outline-none">
                                    </div>
                                </div>

                                <div class="mb-6">
                                    <label class="block text-sm font-semibold text-gray-700 mb-2">👤 Responsável</label>
                                    <input type="text" placeholder="Ex: João Silva" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-green-500 focus:outline-none">
                                </div>

                                <div class="flex gap-4">
                                    <button onclick="app.tela = 'dashboard_emb'; app.render()" class="flex-1 bg-gray-400 hover:bg-gray-500 text-white px-6 py-3 rounded-lg font-bold">❌ Cancelar</button>
                                    <button onclick="alert('✅ Base criada com sucesso!'); app.tela = 'dashboard_emb'; app.render()" class="flex-1 bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-bold">✅ Criar Base</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            // ===== TELAS EMBARCADOR EXISTENTES =====
            renderFretesEmb() {
                const fretes = db.fretes.filter(f => f.empresa_id === this.empresa_id);
                let html = `
                    <div class="min-h-screen bg-gradient-to-br from-blue-50 to-cyan-50 p-6">
                        <div class="max-w-6xl mx-auto">
                            <button onclick="app.tela = 'dashboard_emb'; app.render()" class="mb-6 bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded-lg font-bold">← Voltar</button>
                            <h2 class="text-3xl font-bold text-blue-700 mb-6">📊 Meus Fretes (${fretes.length})</h2>
                            <div class="space-y-4">
                `;
                fretes.forEach(f => {
                    html += `
                        <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-blue-500">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div><p class="text-gray-600 text-sm">📍 Origem</p><p class="font-bold text-lg">${f.origem}</p></div>
                                <div><p class="text-gray-600 text-sm">📍 Destino</p><p class="font-bold text-lg">${f.destino}</p></div>
                                <div><p class="text-gray-600 text-sm">💰 Valor</p><p class="font-bold text-lg text-green-600">${f.valor}</p></div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
                                <div><p class="text-gray-600 text-sm">⚖️ Peso</p><p class="font-bold">${f.peso}</p></div>
                                <div><p class="text-gray-600 text-sm">📅 Data</p><p class="font-bold">${f.data}</p></div>
                                <div><p class="text-gray-600 text-sm">📊 Status</p><p class="font-bold px-3 py-1 rounded text-white inline-block ${f.status === 'Aberto' ? 'bg-yellow-500' : 'bg-green-500'}">${f.status}</p></div>
                            </div>
                            <p class="text-gray-700 mt-4">📦 ${f.descricao}</p>
                        </div>
                    `;
                });
                html += `
                            </div>
                        </div>
                    </div>
                `;
                return html;
            },

            renderBasesEmb() {
                const emb = db.embarcadores.find(e => e.id === this.empresa_id);
                let html = `
                    <div class="min-h-screen bg-gradient-to-br from-green-50 to-blue-50 p-6">
                        <div class="max-w-6xl mx-auto">
                            <button onclick="app.tela = 'dashboard_emb'; app.render()" class="mb-6 bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded-lg font-bold">← Voltar</button>
                            <div class="flex items-center justify-between mb-6">
                                <h2 class="text-3xl font-bold text-green-700">🏢 Gerenciar Bases (${emb?.bases ? emb.bases.length : 0})</h2>
                                <button onclick="app.tela = 'criar_base_emb'; app.render()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-bold transition">➕ Adicionar Nova Base</button>
                            </div>
                            <div class="space-y-4">
                `;
                if (emb?.bases && emb.bases.length > 0) {
                    emb.bases.forEach((b, idx) => {
                        html += `
                            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-green-500">
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                    <div><p class="text-gray-600 text-sm">🏢 Nome</p><p class="font-bold text-lg">${b.nome}</p></div>
                                    <div><p class="text-gray-600 text-sm">📍 Endereço</p><p class="font-bold">${b.endereco || 'N/A'}</p></div>
                                    <div><p class="text-gray-600 text-sm">👤 Responsável</p><p class="font-bold">${b.responsavel || 'N/A'}</p></div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="alert('✅ Funcionalidade de edição em desenvolvimento')" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-bold">✏️ Editar</button>
                                    <button onclick="if(confirm('Tem certeza que deseja remover esta base?')) { alert('✅ Base removida!'); app.render(); }" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-bold">🗑️ Remover</button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    html += `
                        <div class="bg-blue-50 border-2 border-blue-300 rounded-lg p-6 text-center">
                            <p class="text-gray-600 text-lg mb-4">Nenhuma base cadastrada</p>
                            <button onclick="app.tela = 'criar_base_emb'; app.render()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-bold">➕ Criar Primeira Base</button>
                        </div>
                    `;
                }
                html += `
                            </div>
                        </div>
                    </div>
                `;
                return html;
            },

            renderAcessosEmb() {
                const emb = db.embarcadores.find(e => e.id === this.empresa_id);
                let html = `
                    <div class="min-h-screen bg-gradient-to-br from-orange-50 to-blue-50 p-6">
                        <div class="max-w-6xl mx-auto">
                            <button onclick="app.tela = 'dashboard_emb'; app.render()" class="mb-6 bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded-lg font-bold">← Voltar</button>
                            <h2 class="text-3xl font-bold text-orange-700 mb-6">👥 Acessos Adicionais (${emb?.acessos_adicionais ? emb.acessos_adicionais.length : 0})</h2>
                            <div class="space-y-4">
                `;
                if (emb?.acessos_adicionais) {
                    emb.acessos_adicionais.forEach(a => {
                        html += `
                            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-orange-500">
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                    <div><p class="text-gray-600 text-sm">📧 Email</p><p class="font-bold">${a.email}</p></div>
                                    <div><p class="text-gray-600 text-sm">📅 Data</p><p class="font-bold">${a.data}</p></div>
                                    <div><button onclick="alert('✅ Acesso removido!')" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-bold">🗑️ Remover</button></div>
                                </div>
                            </div>
                        `;
                    });
                }
                html += `
                                <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-orange-500 mt-6">
                                    <h3 class="text-lg font-bold text-orange-700 mb-4">➕ Adicionar Novo Acesso</h3>
                                    <div class="space-y-4">
                                        <input type="email" placeholder="Email" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg">
                                        <input type="password" placeholder="Senha" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg">
                                        <button onclick="alert('✅ Acesso adicionado com sucesso!')" class="w-full bg-orange-600 hover:bg-orange-700 text-white px-6 py-2 rounded-lg font-bold">✅ Adicionar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                return html;
            },

            render() {
                let html = '';
                
                if (this.tela === 'inicial') {
                    html = this.renderInicial();
                } else if (this.tela === 'login_motor') {
                    html = this.renderLoginMotor();
                } else if (this.tela === 'cadastro_motor') {
                    html = this.renderCadastroMotor();
                } else if (this.tela === 'login_emb') {
                    html = this.renderLoginEmb();
                } else if (this.tela === 'cadastro_emb') {
                    html = this.renderCadastroEmb();
                } else if (this.tela === 'login_admin') {
                    html = this.renderLoginAdmin();
                } else if (this.tela === 'dashboard_motor') {
                    html = this.renderDashboardMotorista();
                } else if (this.tela === 'dashboard_emb') {
                    html = this.renderDashboardEmbarcador();
                } else if (this.tela === 'dashboard_admin') {
                    html = this.renderDashboardAdmin();
                } else if (this.tela === 'meus_fretes') {
                    html = this.renderFretesEmb();
                } else if (this.tela === 'bases_emb') {
                    html = this.renderBasesEmb();
                } else if (this.tela === 'acessos_emb') {
                    html = this.renderAcessosEmb();
                } else if (this.tela === 'fretes_disponiveis') {
                    html = this.renderFretesDisponiveis();
                } else if (this.tela === 'meus_lances') {
                    html = this.renderMeusLances();
                } else if (this.tela === 'criar_frete_emb') {
                    html = this.renderCriarFrete();
                } else if (this.tela === 'criar_base_emb') {
                    html = this.renderCriarBase();
                } else if (this.tela === 'motoristas_adm') {
                    html = this.renderMotoristaAdmin();
                } else if (this.tela === 'embarcadores_adm') {
                    html = this.renderEmbarcadorAdmin();
                } else if (this.tela === 'fretes_adm') {
                    html = this.renderFretesAdmin();
                } else if (this.tela === 'lances_adm') {
                    html = this.renderLancesAdmin();
                } else {
                    html = `<div class="p-6 text-center"><h1 class="text-2xl font-bold">Tela em desenvolvimento: ${this.tela}</h1><button onclick="app.tela = 'inicial'; app.render()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded">Voltar</button></div>`;
                }

                document.getElementById('app').innerHTML = html;
            }
        };

        // Inicializar app
        app.render();
    </script>
</body>
</html>
